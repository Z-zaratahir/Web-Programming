function pickline(l){const ls=clines[l]||clines['0'];return ls[Math.floor(Math.random()*ls.length)];}
function getoutcome(pos,probs){
  const r=pos/100;let c=0;
  for(const s of probs){c+=s.prob;if(r<=c+0.0001)return s;}
  return probs[probs.length-1];
}

/* sounds */
function useSounds(){
  const ctx=useRef(null);
  function getCtx(){if(!ctx.current)ctx.current=new(window.AudioContext||window.webkitAudioContext)();return ctx.current;}
  function tone(f,d,type='sine',g=0.3){
    try{const ac=getCtx(),o=ac.createOscillator(),gn=ac.createGain();
    o.connect(gn);gn.connect(ac.destination);o.type=type;
    o.frequency.setValueAtTime(f,ac.currentTime);
    gn.gain.setValueAtTime(g,ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
    o.start(ac.currentTime);o.stop(ac.currentTime+d);}catch(e){}
  }
  function chord(fs,d,t='triangle'){fs.forEach(f=>tone(f,d,t,0.16));}
  function crowdcheer(dur=2.0){
    try{
      const ac=getCtx();
      const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*0.55;
      const src=ac.createBufferSource();src.buffer=buf;
      const filt=ac.createBiquadFilter();filt.type='bandpass';
      filt.frequency.setValueAtTime(900,ac.currentTime);filt.Q.value=0.5;
      const gn=ac.createGain();
      gn.gain.setValueAtTime(0,ac.currentTime);
      gn.gain.linearRampToValueAtTime(0.5,ac.currentTime+0.15);
      gn.gain.setValueAtTime(0.45,ac.currentTime+dur-0.3);
      gn.gain.linearRampToValueAtTime(0,ac.currentTime+dur);
      src.connect(filt);filt.connect(gn);gn.connect(ac.destination);
      src.start(ac.currentTime);src.stop(ac.currentTime+dur);
    }catch(e){}
  }
  return {
    playSix:    useCallback(()=>{crowdcheer(2.5);setTimeout(()=>chord([523,659,784,1047],0.6),80);setTimeout(()=>chord([659,784,1047,1319],0.5),270);},[]),
    playFour:   useCallback(()=>{crowdcheer(1.2);setTimeout(()=>chord([440,554,659],0.5),70);},[]),
    playWicket: useCallback(()=>{tone(330,0.28,'sawtooth',0.25);setTimeout(()=>tone(277,0.28,'sawtooth',0.22),190);setTimeout(()=>tone(220,0.45,'sawtooth',0.18),380);},[]),
    playDot:    useCallback(()=>tone(220,0.15,'square',0.1),[]),
    playRuns:   useCallback((r)=>tone({1:392,2:440,3:494}[r]||392,0.32,'triangle',0.2),[]),
    playBowl:   useCallback(()=>{tone(110,0.1,'sawtooth',0.15);setTimeout(()=>tone(80,0.15,'sawtooth',0.1),90);},[]),
    playWin:    useCallback(()=>{crowdcheer(3.0);[523,659,784,1047,784,659,784,1047].forEach((n,i)=>setTimeout(()=>tone(n,0.25,'triangle',0.25),100+i*105));},[]),
    playLose:   useCallback(()=>[392,349,330,294].forEach((n,i)=>setTimeout(()=>tone(n,0.35,'sawtooth',0.18),i*180)),[]),
    playSplash: useCallback(()=>[261,329,392,523,659].forEach((n,i)=>setTimeout(()=>tone(n,0.3,'triangle',0.2),i*90)),[]),
  };
}

    </div>
  );

/* game over */
function GameOver({runs,wickets,ballsbowled,totalballs,totalwickets,bestscore,onrestart,onhome}){
  const sr=ballsbowled>0?((runs/ballsbowled)*100).toFixed(1):'0.0';
  const allout=wickets>=totalwickets;
  const isnb=runs>bestscore;
  let rating,rc;
  if(runs>=80){rating='Legendary Batsman!';rc='#fbbf24';}
  else if(runs>=60){rating='Excellent Knock!';rc='#86efac';}
  else if(runs>=40){rating='Good Innings!';rc='#fde68a';}
  else if(runs>=20){rating='Decent Knock';rc='#fca5a5';}
  else{rating='Needs Practice';rc='#f87171';}
  return(
    <div style={{position:'absolute',inset:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'rgba(92,40,5,.78)',backdropFilter:'blur(5px)'}}>
      <div className="bouncein" style={{width:'100%',maxWidth:380,borderRadius:24,overflow:'hidden',background:'linear-gradient(160deg,#92400e 0%,#b45309 55%,#d97706 100%)',boxShadow:'0 18px 50px rgba(0,0,0,.4)'}}>
        <div style={{padding:'24px 24px 14px',textAlign:'center'}}>
          <div style={{width:54,height:54,borderRadius:'50%',background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px'}}>
            <ITrophy s={30} c="rgba(255,255,255,.9)"/>
          </div>
          <h2 style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:36,margin:0,lineHeight:1}}>INNINGS OVER</h2>
          <p style={{fontFamily:"'Nunito',sans-serif",color:'rgba(255,224,178,.9)',fontSize:11,letterSpacing:4,textTransform:'uppercase',margin:'5px 0 0'}}>{allout?'All Out!':'Overs Completed'}</p>
        </div>
        <div style={{margin:'0 20px 14px',background:'rgba(255,255,255,.15)',borderRadius:18,border:'1px solid rgba(255,255,255,.2)',padding:'16px 18px',textAlign:'center'}}>
          <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:66,lineHeight:1}}>{runs}</div>
          <div style={{fontFamily:"'Nunito',sans-serif",color:'rgba(255,255,255,.8)',fontSize:11,letterSpacing:3,textTransform:'uppercase',marginTop:3}}>Total Runs</div>
          <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:800,fontSize:17,color:rc,marginTop:7}}>{rating}</div>
          {isnb&&<div style={{display:'inline-block',marginTop:7,background:'rgba(255,251,235,.9)',borderRadius:99,padding:'3px 13px',fontFamily:"'Baloo 2',cursive",fontWeight:800,color:'#92400e',fontSize:11}}>NEW BEST SCORE!</div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,margin:'0 20px 18px'}}>
          {[['Wickets',`${wickets}/${totalwickets}`],['Balls',ballsbowled],['SR',sr]].map(([l,v])=>(
            <div key={l} style={{background:'rgba(255,255,255,.15)',borderRadius:14,padding:'10px 6px',textAlign:'center'}}>
              <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:20}}>{v}</div>
              <div style={{fontFamily:"'Nunito',sans-serif",color:'rgba(255,255,255,.72)',fontSize:10,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:9,padding:'0 20px 22px'}}>
          <button onClick={onhome} style={{width:46,height:46,borderRadius:13,background:'rgba(255,255,255,.18)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IHome s={19} c="white"/></button>
          <button onClick={onrestart} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:9,padding:'12px',borderRadius:15,background:'white',border:'none',cursor:'pointer',fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'#92400e',fontSize:17,boxShadow:'0 3px 12px rgba(0,0,0,.14)'}}>
            <IRotate s={18} c="#92400e"/> Play Again
          </button>
        </div>
      </div>
    </div>
  );
}

/* result flash */
function ResultFlash({result,commentary,visible}){
  if(!visible||!result)return null;
  const isw=result.runs===null,is6=result.runs===6,is4=result.runs===4;
  const bg=isw?'linear-gradient(135deg,#7f1d1d,#b91c1c)':is6||is4?'linear-gradient(135deg,#78350f,#d97706)':'linear-gradient(135deg,#14532d,#16a34a)';
  const bd=isw?'#fca5a5':is6||is4?'#fcd34d':'#86efac';
  const glow=isw?'rgba(239,68,68,.5)':is6||is4?'rgba(251,191,36,.5)':'rgba(74,222,128,.4)';
  const txt=isw?'OUT!':is6?'SIX!':is4?'FOUR!':result.runs===0?'DOT':`+${result.runs}`;
  return(
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:30}}>
      <div className="bouncein" style={{background:bg,border:`3px solid ${bd}`,borderRadius:22,padding:'18px 38px',textAlign:'center',boxShadow:`0 0 45px ${glow},0 8px 28px rgba(0,0,0,.28)`,minWidth:180}}>
        <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:54,lineHeight:1,textShadow:'0 3px 10px rgba(0,0,0,.35)'}}>{txt}</div>
        <p style={{fontFamily:"'Nunito',sans-serif",color:'rgba(255,255,255,.92)',fontSize:14,margin:'7px 0 0',lineHeight:1.4}}>{commentary}</p>
      </div>
    </div>
  );
}

/* game screen - field is full viewport, HUD overlays at bottom */
function GameScreen({onback,config}){
  const totalballs=config.overs*6;
  const totalwickets=config.wickets;
  const [runs,setruns]=useState(0);
  const [wickets,setwickets]=useState(0);
  const [ballsbowled,setballsbowled]=useState(0);
  const [bestscore,setbestscore]=useState(0);
  const [style,setstyle]=useState('aggressive');
  const [phase,setphase]=useState('idle');
  const [sliderpos,setsliderpos]=useState(0);
  const [ballx,setballx]=useState(700);
  const [bally,setbally]=useState(252);
  const [ballvisible,setballvisible]=useState(false);
  const [swinging,setswinging]=useState(false);
  const [running,setrunning]=useState(false);
  const [lastresult,setlastresult]=useState(null);
  const [comtext,setcomtext]=useState('');
  const [showresult,setshowresult]=useState(false);
  const [showprobguide,setshowprobguide]=useState(false);
  const slideref=useRef(0);
  const dirref=useRef(1);
  const animframe=useRef(null);
  const sounds=useSounds();

  useEffect(()=>{
    if(phase!=='bowling')return;
    const spd=spdmap[config.speed]||0.52;
    const tick=()=>{
      slideref.current+=dirref.current*spd;
      if(slideref.current>=100){slideref.current=100;dirref.current=-1;}
      if(slideref.current<=0){slideref.current=0;dirref.current=1;}
      setsliderpos(slideref.current);
      animframe.current=requestAnimationFrame(tick);
    };
    animframe.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(animframe.current);
  },[phase,config.speed]);

  const startbowling=useCallback(()=>{
    if(phase!=='idle')return;
    sounds.playBowl();
    setrunning(true);setballvisible(true);setballx(700);setbally(252);
    setshowresult(false);setlastresult(null);
    setTimeout(()=>{setrunning(false);setphase('bowling');},380);
  },[phase,sounds]);

  const handleshot=useCallback(()=>{
    if(phase!=='bowling')return;
    cancelAnimationFrame(animframe.current);
    const probs=style==='aggressive'?agprobs:dfprobs;
    const outcome=getoutcome(slideref.current,probs);
    const line=pickline(outcome.label);
    setphase('animating');setswinging(true);
    let prog=0;
    const ba=setInterval(()=>{
      prog+=0.062;
      setballx(700+Math.sin(prog*3)*8);
      setbally(252+prog*(468-252));
      if(prog>=1){
        clearInterval(ba);
        setballvisible(false);setswinging(false);
        setlastresult(outcome);setcomtext(line);setshowresult(true);
        if(outcome.runs===null)sounds.playWicket();
        else if(outcome.runs===6)sounds.playSix();
        else if(outcome.runs===4)sounds.playFour();
        else if(outcome.runs===0)sounds.playDot();
        else sounds.playRuns(outcome.runs);
        const nb=ballsbowled+1;setballsbowled(nb);
        let nr=runs,nw=wickets;
        if(outcome.runs!==null){nr=runs+outcome.runs;setruns(nr);if(nr>bestscore)setbestscore(nr);}
        else{nw=wickets+1;setwickets(nw);}
        const isover=nb>=totalballs||nw>=totalwickets;
        if(isover){
          if(nr>=bestscore)sounds.playWin();else sounds.playLose();
          setTimeout(()=>{setshowresult(false);setphase('gameover');},2400);
        }else{
          setTimeout(()=>{setshowresult(false);slideref.current=0;dirref.current=1;setsliderpos(0);setphase('idle');},2400);
        }
      }
    },30);
  },[phase,style,ballsbowled,runs,wickets,bestscore,totalballs,totalwickets,sounds]);

  const handlerestart=()=>{
    setruns(0);setwickets(0);setballsbowled(0);
    setphase('idle');slideref.current=0;dirref.current=1;
    setsliderpos(0);setshowresult(false);setlastresult(null);
    setballvisible(false);setswinging(false);setcomtext('');
  };

  const canbowl=phase==='idle';
  const canbat=phase==='bowling';
  const isgameover=phase==='gameover';
  const curprobs=style==='aggressive'?agprobs:dfprobs;
  const oc=Math.floor(ballsbowled/6);
  const bio=ballsbowled%6;
  const bl=totalballs-ballsbowled;
  const sr=ballsbowled>0?((runs/ballsbowled)*100).toFixed(1):'0.0';

  return(
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
      {/* FULL SCREEN FIELD */}
      <DesiBground ballx={ballx} bally={bally} ballvisible={ballvisible} swinging={swinging} style={style} running={running}/>

      <ResultFlash result={lastresult} commentary={comtext} visible={showresult}/>
      {isgameover&&<GameOver runs={runs} wickets={wickets} ballsbowled={ballsbowled} totalballs={totalballs} totalwickets={totalwickets} bestscore={bestscore} onrestart={handlerestart} onhome={onback}/>}

      {/* top bar - transparent gradient */}
      <div style={{position:'absolute',top:0,left:0,right:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',zIndex:20,background:'linear-gradient(180deg,rgba(0,0,0,.38) 0%,transparent 100%)'}}>
        <button onClick={onback} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.18)',backdropFilter:'blur(4px)',border:'1px solid rgba(255,255,255,.25)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IArrow s={17} c="white"/></button>
        <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:20,letterSpacing:3,textShadow:'0 2px 8px rgba(0,0,0,.45)'}}>BAT-TER UP</div>
        <button onClick={handlerestart} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.18)',backdropFilter:'blur(4px)',border:'1px solid rgba(255,255,255,.25)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><IRotate s={15} c="white"/></button>
      </div>

      {/* LEFT FLOATING SCOREBOARD */}
      <div style={{position:'absolute',top:58,left:12,zIndex:20,width:168,background:'rgba(255,251,235,.93)',backdropFilter:'blur(8px)',borderRadius:18,border:'1px solid rgba(245,158,11,.3)',boxShadow:'0 4px 20px rgba(0,0,0,.18)',overflow:'hidden'}}>
        <div style={{background:'#f59e0b',padding:'7px 12px',display:'flex',alignItems:'center',gap:7}}>
          <ITrophy s={14} c="rgba(255,255,255,.9)"/>
          <span style={{fontFamily:"'Baloo 2',cursive",fontWeight:800,color:'white',fontSize:10,letterSpacing:2.5}}>SCOREBOARD</span>
        </div>
        <div style={{padding:'10px 14px 8px',textAlign:'center',borderBottom:'1px solid #fde68a',background:'linear-gradient(135deg,#fffbeb,#fef3c7)'}}>
          <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'#92400e',fontSize:42,lineHeight:1}}>{runs}<span style={{fontSize:19,color:'#d97706'}}>/{wickets}</span></div>
          <div style={{fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8.5,letterSpacing:2.5,marginTop:1,textTransform:'uppercase'}}>Runs / Wickets</div>
        </div>
        <div style={{padding:'8px 10px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
          {[['Overs',`${oc}.${bio}`],['Balls Left',bl],['Strike Rate',sr],['Best',bestscore]].map(([l,v])=>(
            <div key={l} style={{background:'#fffbeb',borderRadius:9,padding:'6px 4px',textAlign:'center',border:'1px solid #fde68a'}}>
              <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'#92400e',fontSize:16,lineHeight:1}}>{v}</div>
              <div style={{fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8,marginTop:2,textTransform:'uppercase',letterSpacing:.7}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{padding:'0 10px 9px'}}>
          <div style={{fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>Balls</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {[...Array(totalballs)].map((_,i)=>(
              <div key={i} style={{width:11,height:11,borderRadius:'50%',background:i<ballsbowled?'#c0392b':'#fde68a',border:`1.5px solid ${i<ballsbowled?'#991b1b':'#fcd34d'}`,transition:'background .3s'}}/>
            ))}
          </div>
        </div>
        <div style={{padding:'0 10px 10px'}}>
          <div style={{fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>Wickets Left</div>
          <div style={{display:'flex',gap:5}}>
            {[...Array(totalwickets)].map((_,i)=>(
              <div key={i} style={{width:14,height:14,borderRadius:'50%',background:i<(totalwickets-wickets)?'#ef4444':'rgba(0,0,0,.12)',border:`2px solid ${i<(totalwickets-wickets)?'#b91c1c':'rgba(0,0,0,.12)'}`}}/>
            ))}
          </div>
        </div>
      </div>

      {/* RIGHT PROB TOGGLE */}
      <div style={{position:'absolute',top:58,right:12,zIndex:20}}>
        <button onClick={()=>setshowprobguide(p=>!p)}
          style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.22)',backdropFilter:'blur(4px)',border:'1px solid rgba(255,255,255,.3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8}}>
          <span style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:14}}>%</span>
        </button>
        {showprobguide&&(
          <div style={{background:'rgba(255,251,235,.93)',backdropFilter:'blur(8px)',borderRadius:16,border:'1px solid rgba(245,158,11,.3)',overflow:'hidden',width:158,boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>
            <div style={{background:style==='aggressive'?'#b91c1c':'#3d7a1f',padding:'6px 12px'}}>
              <span style={{fontFamily:"'Baloo 2',cursive",fontWeight:800,color:'white',fontSize:11,letterSpacing:2}}>{style==='aggressive'?'AGGRESSIVE':'DEFENSIVE'}</span>
            </div>
            <div style={{padding:'10px 12px'}}>
              {curprobs.map((p,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:p.color,flexShrink:0}}/>
                  <span style={{fontFamily:"'Nunito',sans-serif",fontWeight:600,color:'#92400e',fontSize:11,flex:1}}>{p.display}</span>
                  <span style={{fontFamily:"'Baloo 2',cursive",fontWeight:800,fontSize:11,color:p.color}}>{Math.round(p.prob*100)}%</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM HUD - compact */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:20,background:'rgba(255,251,235,.95)',backdropFilter:'blur(10px)',borderTop:'2px solid rgba(245,158,11,.3)',boxShadow:'0 -4px 24px rgba(0,0,0,.15)'}}>
        <div style={{padding:'9px 14px 11px',display:'flex',flexDirection:'column',gap:8}}>

          {/* style + bowl button */}
          <div style={{display:'flex',gap:8,alignItems:'stretch'}}>
            <div style={{flex:1,display:'flex',gap:6}}>
              {[
                {val:'aggressive',label:'Aggressive',sub:'High risk',Icon:IZap,ac:'#b91c1c',bc:'#fee2e2'},
                {val:'defensive', label:'Defensive', sub:'Safe',     Icon:IShield,ac:'#3d7a1f',bc:'#dcfce7'},
              ].map(o=>{
                const sel=style===o.val;
                return(
                  <button key={o.val} onClick={()=>canbowl&&setstyle(o.val)} disabled={!canbowl}
                    style={{flex:1,display:'flex',alignItems:'center',gap:6,padding:'7px 10px',borderRadius:12,border:`2px solid ${sel?o.ac:o.bc}`,background:sel?o.ac:o.bc,cursor:canbowl?'pointer':'default',opacity:!canbowl&&!sel?.55:1,transition:'all .15s'}}>
                    <o.Icon s={14} c={sel?'white':o.ac}/>
                    <div style={{textAlign:'left'}}>
                      <div style={{fontFamily:"'Baloo 2',cursive",fontWeight:800,color:sel?'white':o.ac,fontSize:13,lineHeight:1}}>{o.label}</div>
                      <div style={{fontFamily:"'Nunito',sans-serif",fontSize:10,color:sel?'rgba(255,255,255,.8)':o.ac,marginTop:1}}>{o.sub}</div>
                    </div>
                  </button>
                );
              })}
            </div>
            <button onClick={canbowl?startbowling:canbat?handleshot:undefined} disabled={phase==='animating'||isgameover}
              style={{flexShrink:0,width:95,borderRadius:14,border:'none',cursor:(phase==='animating'||isgameover)?'not-allowed':'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,background:canbowl?'linear-gradient(135deg,#f59e0b,#d97706)':canbat?'linear-gradient(135deg,#3d7a1f,#2a5714)':'#e5e7eb',color:'white',opacity:(phase==='animating'||isgameover)?.55:1,transition:'all .18s',boxShadow:canbowl?'0 3px 14px rgba(245,158,11,.45)':canbat?'0 3px 14px rgba(61,122,31,.4)':'none'}}>
              {canbowl?(<><IPlay s={21} c="white"/><span style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,fontSize:14}}>BOWL!</span></>)

              :(<span style={{fontFamily:"'Nunito',sans-serif",fontSize:13,color:'#9ca3af'}}>...</span>)}
            </button>
          </div>

          {/* power bar */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontFamily:"'Nunito',sans-serif",fontWeight:800,color:'#92400e',fontSize:10,letterSpacing:2,textTransform:'uppercase'}}>Power Bar</span>
              <span style={{fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:10}}>{canbat?'Click bar to play shot!':canbowl?'Bowl first':'Wait...'}</span>
            </div>
            {/* slider arrow */}
            <div style={{position:'relative',height:10,marginBottom:2}}>
              <div style={{position:'absolute',left:`${sliderpos}%`,transform:'translateX(-50%)'}}>
                <div style={{width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderTop:'8px solid #92400e'}}/>
              </div>
            </div>
            {/* bar */}
            <div onClick={canbat?handleshot:undefined}
              style={{position:'relative',display:'flex',height:48,borderRadius:13,overflow:'hidden',border:'2px solid #fde68a',cursor:canbat?'pointer':'not-allowed',boxShadow:'0 3px 12px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,.35)'}}>
              {(()=>{let cum=0;return curprobs.map((seg,i)=>{
                const s=cum;cum+=seg.prob;
                return(
                  <div key={i} style={{width:`${seg.prob*100}%`,background:seg.color,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',borderRight:i<curprobs.length-1?'1.5px solid rgba(255,255,255,.28)':'none',overflow:'hidden'}}>
                    <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(255,255,255,.2) 0%,transparent 55%)',pointerEvents:'none'}}/>
                    <span style={{fontFamily:"'Baloo 2',cursive",fontWeight:900,color:'white',fontSize:seg.prob>=.1?13:10,textShadow:'0 1px 3px rgba(0,0,0,.45)',zIndex:1}}>{seg.label}</span>
                    {seg.prob>=.08&&<span style={{fontFamily:"'Nunito',sans-serif",color:'rgba(255,255,255,.85)',fontSize:9,zIndex:1}}>{Math.round(seg.prob*100)}%</span>}
                  </div>
                );
              });})()}
              <div style={{position:'absolute',top:0,bottom:0,left:`${sliderpos}%`,transform:'translateX(-50%)',width:3,background:'white',boxShadow:'0 0 9px 2px rgba(255,255,255,.9)',zIndex:20,pointerEvents:'none'}}/>
            </div>
            {/* scale labels */}
            <div style={{position:'relative',height:14,marginTop:3}}>
              {(()=>{let c=0;return curprobs.map((seg,i)=>{const s=c;c+=seg.prob;return(<span key={i} style={{position:'absolute',left:`${s*100}%`,transform:'translateX(-50%)',fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8.5,top:1}}>{s===0?'0':s.toFixed(2)}</span>);});})()}
              <span style={{position:'absolute',right:0,fontFamily:"'Nunito',sans-serif",color:'#b45309',fontSize:8.5,top:1}}>1.00</span>
            </div>
          </div>

          {/* commentary */}
          <div style={{display:'flex',alignItems:'center',gap:7,background:comtext?'#fffbeb':'#fafafa',borderRadius:11,border:`1px solid ${comtext?'#fde68a':'#e5e7eb'}`,padding:'6px 11px',minHeight:32,transition:'all .3s'}}>
            <IMic s={12} c={comtext?'#f59e0b':'#9ca3af'}/>
            <p style={{fontFamily:"'Nunito',sans-serif",fontWeight:comtext?700:400,color:comtext?'#92400e':'#9ca3af',fontSize:12,margin:0,lineHeight:1.3,fontStyle:comtext?'normal':'italic'}}>{comtext||'Commentary will appear here...'}</p>
          </div>
        </div>
      </div>
    </div>
  );
}

/* root */
function App(){
  const [screen,setscreen]=useState('splash');
  const [config,setconfig]=useState({overs:2,wickets:2,speed:'normal'});
  if(screen==='splash')return <SplashScreen ondone={()=>setscreen('home')}/>;
  if(screen==='inst')return <Instructions onback={()=>setscreen('home')}/>;
  if(screen==='set')return <Settings config={config} onchange={setconfig} onback={()=>setscreen('home')}/>;
  if(screen==='game')return <GameScreen onback={()=>setscreen('home')} config={config}/>;
  return <HomeScreen onplay={()=>setscreen('game')} oninst={()=>setscreen('inst')} onset={()=>setscreen('set')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
