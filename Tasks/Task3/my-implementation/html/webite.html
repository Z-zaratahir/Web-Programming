                <div class="forms">

                        <div class="login-form">
                            <div class="title">Login</div>
                                <form action="http://localhost:3000/login" method="POST">
                                    <div class="input-boxes">
                                        
                                        <div class="input-box">
                                            <i class="fas fa-user"></i>
                                            <input type="text" name="username" placeholder="Enter your username" required>
                                        </div>
                                        <div class="input-box">

                                    </div>
                                    
                                </form>
                        </div>

                            <div class="title">Signup</div>

                                        <div class="input-box">
                                            <i class="fas fa-user"></i>
                                            <input type="text" name="username" placeholder="Enter your username" required>
                                        </div>
                                        <div class="input-box">
                                            <i class="fas fa-lock"></i>
                                            <input type="password" name="password" placeholder="Enter your password" required>
                                        </div>
                                        <button type="submit" class="button">Submit</button>

                                        <div class="signupnow">Already have an account? <label for="flip">Login now</label></div>
                                    </div>
                                </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlparams = new URLSearchParams(window.location.search);
        const loginmessage = document.getElementById('loginmessage');
        
        if (urlparams.get('registered') === 'true') {
            loginmessage.style.color = '#5cb85c';
            loginmessage.textContent = 'Registration successful! Please login with your credentials.';
        }
        
        if (urlparams.get('error') === 'invalid') {
            loginmessage.style.color = '#d9534f';
            loginmessage.textContent = 'Invalid username or password. Please try again.';
        }
    </script>
